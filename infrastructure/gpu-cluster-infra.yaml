AWSTemplateFormatVersion: '2010-09-09'
Description: >
  GPU cluster monitoring infrastructure - VPC + FSx Lustre + Security Groups +
  self-hosted Prometheus/Grafana with ALB. Supports all NVIDIA GPU generations
  (g5, p5, p5e, p5en, p6-b200, p6-gb200).

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: General
        Parameters:
          - VPCName
          - PrimarySubnetAZ
          - SecondarySubnetAZ
          - VpcCidr
          - VpcSecondaryCidr
      - Label:
          default: Monitoring instance
        Parameters:
          - MonitoringKeyPair
          - AllowedIPsForSSH
          - AllowedIPsForALB
      - Label:
          default: Grafana
        Parameters:
          - GrafanaAdminPassword
          - S3BucketName
      - Label:
          default: FSx Lustre
        Parameters:
          - FSxCapacity
          - FSxThroughput

Parameters:
  VPCName:
    Type: String
    Default: gpu-cluster-monitoring
    Description: Name tag prefix for VPC resources

  PrimarySubnetAZ:
    Type: AWS::EC2::AvailabilityZone::Name
    Description: Primary AZ for cluster + FSx (must match Capacity Block AZ if using CB)

  SecondarySubnetAZ:
    Type: AWS::EC2::AvailabilityZone::Name
    Description: Secondary AZ for ALB (must differ from primary)

  MonitoringKeyPair:
    Type: AWS::EC2::KeyPair::KeyName
    Description: EC2 key pair for SSH into monitoring instance

  AllowedIPsForSSH:
    Type: String
    Description: "CIDR for SSH access. Use YOUR_IP/32 — never 0.0.0.0/0 in production."

  AllowedIPsForALB:
    Type: String
    Description: "CIDR for Grafana web access via ALB. Use YOUR_IP/32 — never 0.0.0.0/0 in production."

  GrafanaAdminPassword:
    Type: String
    NoEcho: true
    Default: admin
    Description: Grafana admin password. Change immediately after first login.

  S3BucketName:
    Type: String
    Default: ''
    Description: S3 bucket containing dashboards/ (optional — auto-provisioned at startup if provided)

  VpcCidr:
    Type: String
    Default: 10.0.0.0/16
    Description: Primary VPC CIDR block (e.g. 10.0.0.0/16). Must not overlap with existing VPCs.

  VpcSecondaryCidr:
    Type: String
    Default: 10.1.0.0/16
    Description: Secondary VPC CIDR for private subnet (e.g. 10.1.0.0/16). Must not overlap with primary.

  FSxCapacity:
    Type: Number
    Default: 1200
    Description: FSx Lustre capacity (GiB). Min 1200, then +2400 increments.

  FSxThroughput:
    Type: Number
    Default: 250
    AllowedValues: [125, 250, 500, 1000]
    Description: FSx Lustre PERSISTENT_2 throughput per TiB (MB/s/TiB)

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      EnableDnsSupport: true
      EnableDnsHostnames: true
      CidrBlock: !Ref VpcCidr
      Tags:
        - Key: Name
          Value: !Sub ${VPCName}-vpc

  VpcCidrBlock:
    Type: AWS::EC2::VPCCidrBlock
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref VpcSecondaryCidr

  InternetGateway:
    Type: AWS::EC2::InternetGateway

  GatewayAttach:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  ElasticIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc

  NATGateway:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt ElasticIP.AllocationId
      SubnetId: !Ref PublicSubnet

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Select [0, !Cidr [!GetAtt VPC.CidrBlock, 2, 15]]
      AvailabilityZone: !Ref PrimarySubnetAZ
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub ${VPCName}-public-${PrimarySubnetAZ}

  SecondaryPublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Select [1, !Cidr [!GetAtt VPC.CidrBlock, 2, 15]]
      AvailabilityZone: !Ref SecondarySubnetAZ
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub ${VPCName}-public-${SecondarySubnetAZ}

  PrivateSubnet:
    Type: AWS::EC2::Subnet
    DependsOn: VpcCidrBlock
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Select [0, !Cidr [!Ref VpcSecondaryCidr, 2, 15]]
      AvailabilityZone: !Ref PrimarySubnetAZ
      Tags:
        - Key: Name
          Value: !Sub ${VPCName}-private-${PrimarySubnetAZ}

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: GatewayAttach
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC

  PrivateRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NATGateway

  PublicSubnetAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref PublicRouteTable

  SecondaryPublicSubnetAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref SecondaryPublicSubnet
      RouteTableId: !Ref PublicRouteTable

  PrivateSubnetAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet
      RouteTableId: !Ref PrivateRouteTable

  S3Endpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VPC
      ServiceName: !Sub com.amazonaws.${AWS::Region}.s3
      RouteTableIds:
        - !Ref PublicRouteTable
        - !Ref PrivateRouteTable
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: '*'
            Resource: '*'

  # ---- Security Groups ----

  HeadNodeSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub ${VPCName}-headnode-sg
      GroupDescription: HeadNode SG
      VpcId: !Ref VPC
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub ${VPCName}-headnode-sg

  ComputeNodeSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub ${VPCName}-compute-sg
      GroupDescription: Compute SG (EFA enabled)
      VpcId: !Ref VPC
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub ${VPCName}-compute-sg

  LoginNodeSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub ${VPCName}-login-sg
      GroupDescription: Login node SG
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref AllowedIPsForSSH
          Description: SSH
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub ${VPCName}-login-sg

  MonitoringSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub ${VPCName}-monitoring-sg
      GroupDescription: Prometheus + Grafana monitoring instance
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref AllowedIPsForSSH
          Description: SSH
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  ALBSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub ${VPCName}-alb-sg
      GroupDescription: ALB for Grafana
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: !Ref AllowedIPsForALB
          Description: HTTP
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  FSxSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub ${VPCName}-fsx-sg
      GroupDescription: FSx Lustre SG
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 988
          ToPort: 988
          CidrIp: !Ref VpcCidr
        - IpProtocol: tcp
          FromPort: 988
          ToPort: 988
          CidrIp: !Ref VpcSecondaryCidr
        - IpProtocol: tcp
          FromPort: 1021
          ToPort: 1023
          CidrIp: !Ref VpcCidr
        - IpProtocol: tcp
          FromPort: 1021
          ToPort: 1023
          CidrIp: !Ref VpcSecondaryCidr
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  # ---- Security Group Ingress rules (separated to avoid circular deps) ----

  ComputeSelfIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      Description: All traffic between compute nodes (EFA, distributed training)
      IpProtocol: -1
      GroupId: !Ref ComputeNodeSG
      SourceSecurityGroupId: !Ref ComputeNodeSG

  ComputeFromHeadIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      Description: Slurm + NFS from HeadNode
      IpProtocol: -1
      GroupId: !Ref ComputeNodeSG
      SourceSecurityGroupId: !Ref HeadNodeSG

  ComputeFromLoginIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      Description: From LoginNode
      IpProtocol: -1
      GroupId: !Ref ComputeNodeSG
      SourceSecurityGroupId: !Ref LoginNodeSG

  HeadFromComputeIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      Description: Slurm from Compute
      IpProtocol: -1
      GroupId: !Ref HeadNodeSG
      SourceSecurityGroupId: !Ref ComputeNodeSG

  HeadFromLoginIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      Description: From LoginNode
      IpProtocol: -1
      GroupId: !Ref HeadNodeSG
      SourceSecurityGroupId: !Ref LoginNodeSG

  LoginFromHeadIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      Description: NFS + Slurm from HeadNode
      IpProtocol: -1
      GroupId: !Ref LoginNodeSG
      SourceSecurityGroupId: !Ref HeadNodeSG

  HeadFromMonitoring9100:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      Description: node_exporter
      IpProtocol: tcp
      FromPort: 9100
      ToPort: 9100
      GroupId: !Ref HeadNodeSG
      SourceSecurityGroupId: !Ref MonitoringSG

  HeadFromMonitoring8080:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      Description: slurm_exporter
      IpProtocol: tcp
      FromPort: 8080
      ToPort: 8080
      GroupId: !Ref HeadNodeSG
      SourceSecurityGroupId: !Ref MonitoringSG

  ComputeFromMonitoring9100:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      Description: node_exporter
      IpProtocol: tcp
      FromPort: 9100
      ToPort: 9100
      GroupId: !Ref ComputeNodeSG
      SourceSecurityGroupId: !Ref MonitoringSG

  ComputeFromMonitoring9400:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      Description: DCGM exporter
      IpProtocol: tcp
      FromPort: 9400
      ToPort: 9400
      GroupId: !Ref ComputeNodeSG
      SourceSecurityGroupId: !Ref MonitoringSG

  MonitoringFromALB3000:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      Description: Grafana from ALB
      IpProtocol: tcp
      FromPort: 3000
      ToPort: 3000
      GroupId: !Ref MonitoringSG
      SourceSecurityGroupId: !Ref ALBSG

  # ---- FSx Lustre ----
  FSxLustre:
    Type: AWS::FSx::FileSystem
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      FileSystemType: LUSTRE
      StorageType: SSD
      FileSystemTypeVersion: '2.15'
      StorageCapacity: !Ref FSxCapacity
      SecurityGroupIds:
        - !Ref FSxSG
      SubnetIds:
        - !Ref PrivateSubnet
      LustreConfiguration:
        DeploymentType: PERSISTENT_2
        DataCompressionType: LZ4
        PerUnitStorageThroughput: !Ref FSxThroughput

  # ---- Monitoring instance ----
  MonitoringInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: MonitoringInstancePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ec2:DescribeInstances
                  - ec2:DescribeTags
                Resource: '*'
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !Sub 'arn:aws:s3:::${S3BucketName}'
                  - !Sub 'arn:aws:s3:::${S3BucketName}/*'

  MonitoringInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref MonitoringInstanceRole

  MonitoringInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.medium
      ImageId: "{{resolve:ssm:/aws/service/canonical/ubuntu/server/22.04/stable/current/amd64/hvm/ebs-gp2/ami-id}}"
      KeyName: !Ref MonitoringKeyPair
      IamInstanceProfile: !Ref MonitoringInstanceProfile
      BlockDeviceMappings:
        - DeviceName: /dev/sda1
          Ebs:
            VolumeSize: 50
            VolumeType: gp3
            DeleteOnTermination: true
      NetworkInterfaces:
        - AssociatePublicIpAddress: true
          DeviceIndex: 0
          SubnetId: !Ref PublicSubnet
          GroupSet:
            - !Ref MonitoringSG
      Tags:
        - Key: Name
          Value: !Sub ${VPCName}-monitoring
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -euxo pipefail
          export DEBIAN_FRONTEND=noninteractive

          apt-get update
          apt-get install -y ca-certificates curl gnupg lsb-release unzip

          # AWS CLI v2
          curl -s https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip -o /tmp/awscliv2.zip
          unzip -q /tmp/awscliv2.zip -d /tmp
          /tmp/aws/install -i /usr/local/aws-cli -b /usr/local/bin
          rm -rf /tmp/awscliv2.zip /tmp/aws

          # Docker
          install -m 0755 -d /etc/apt/keyrings
          curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
          chmod a+r /etc/apt/keyrings/docker.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable" \
            > /etc/apt/sources.list.d/docker.list
          apt-get update
          apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
          systemctl enable --now docker

          mkdir -p /opt/monitoring/{prometheus,grafana/provisioning/datasources,grafana/provisioning/dashboards,grafana/dashboards}

          # Prometheus config (EC2 SD — Name tag-based node_name relabeling)
          # Note: do NOT use slurm:hostname tag — pcluster manages it internally
          cat > /opt/monitoring/prometheus/prometheus.yml <<EOF
          global:
            scrape_interval: 15s
            evaluation_interval: 15s

          scrape_configs:
            - job_name: prometheus
              static_configs:
                - targets: ['localhost:9090']

            - job_name: node_exporter
              ec2_sd_configs:
                - region: ${AWS::Region}
                  port: 9100
                  filters:
                    - name: tag:parallelcluster:cluster-name
                      values: ['*']
              relabel_configs:
                - source_labels: [__meta_ec2_private_ip]
                  target_label: instance
                - source_labels: [__meta_ec2_tag_parallelcluster_node_type]
                  target_label: node_type
                - source_labels: [__meta_ec2_private_ip]
                  target_label: node_name
                - source_labels: [__meta_ec2_tag_Name]
                  regex: (.+)
                  target_label: node_name
                - source_labels: [__meta_ec2_tag_Name, __meta_ec2_private_ip]
                  regex: "(.+);(.+)"
                  replacement: '\$1 (\$2)'
                  target_label: node_name

            - job_name: dcgm_exporter
              ec2_sd_configs:
                - region: ${AWS::Region}
                  port: 9400
                  filters:
                    - name: tag:parallelcluster:node-type
                      values: ['Compute']
              relabel_configs:
                - source_labels: [__meta_ec2_private_ip]
                  target_label: instance
                - source_labels: [__meta_ec2_private_ip]
                  target_label: node_name
                - source_labels: [__meta_ec2_tag_Name]
                  regex: (.+)
                  target_label: node_name
                - source_labels: [__meta_ec2_tag_Name, __meta_ec2_private_ip]
                  regex: "(.+);(.+)"
                  replacement: '\$1 (\$2)'
                  target_label: node_name

            - job_name: slurm_exporter
              ec2_sd_configs:
                - region: ${AWS::Region}
                  port: 8080
                  filters:
                    - name: tag:parallelcluster:node-type
                      values: ['HeadNode']
              relabel_configs:
                - source_labels: [__meta_ec2_private_ip]
                  target_label: instance
          EOF

          cat > /opt/monitoring/grafana/provisioning/datasources/prometheus.yml <<EOF
          apiVersion: 1
          datasources:
            - name: Prometheus
              type: prometheus
              access: proxy
              url: http://prometheus:9090
              isDefault: true
              editable: true
          EOF

          cat > /opt/monitoring/grafana/provisioning/dashboards/dashboards.yml <<EOF
          apiVersion: 1
          providers:
            - name: default
              orgId: 1
              folder: ''
              type: file
              disableDeletion: false
              updateIntervalSeconds: 30
              allowUiUpdates: true
              options:
                path: /var/lib/grafana/dashboards
          EOF

          cat > /opt/monitoring/docker-compose.yml <<EOF
          services:
            prometheus:
              image: prom/prometheus:v3.11.2
              container_name: prometheus
              restart: unless-stopped
              volumes:
                - /opt/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
                - prometheus-data:/prometheus
              command:
                - --config.file=/etc/prometheus/prometheus.yml
                - --storage.tsdb.path=/prometheus
                - --storage.tsdb.retention.time=30d
                - --web.enable-lifecycle
              ports:
                - "9090:9090"

            grafana:
              image: grafana/grafana-oss:13.0.1
              container_name: grafana
              restart: unless-stopped
              depends_on: [prometheus]
              environment:
                GF_SECURITY_ADMIN_USER: admin
                GF_SECURITY_ADMIN_PASSWORD: ${GrafanaAdminPassword}
                GF_USERS_ALLOW_SIGN_UP: "false"
              volumes:
                - /opt/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
                - /opt/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
                - grafana-data:/var/lib/grafana
              ports:
                - "3000:3000"

          volumes:
            prometheus-data:
            grafana-data:
          EOF

          cd /opt/monitoring && docker compose up -d

          # Download dashboards from S3 if bucket provided
          S3_BUCKET="${S3BucketName}"
          if [ -n "$S3_BUCKET" ]; then
            echo "Downloading dashboards from s3://$S3_BUCKET/dashboards/"
            for i in $(seq 1 10); do
              aws s3 sync "s3://$S3_BUCKET/dashboards/" /opt/monitoring/grafana/dashboards/ \
                --exclude "*.py" --region ${AWS::Region} 2>&1 && break || sleep 10
            done
            echo "Dashboards: $(ls /opt/monitoring/grafana/dashboards/*.json 2>/dev/null | wc -l) files"
            cd /opt/monitoring && docker compose restart grafana
          fi

          echo "Monitoring stack up. Grafana on :3000"

  # ---- ALB ----
  ALB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: pcluster-alb
      Type: application
      Scheme: internet-facing
      Subnets:
        - !Ref PublicSubnet
        - !Ref SecondaryPublicSubnet
      SecurityGroups:
        - !Ref ALBSG

  GrafanaTG:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: pcluster-grafana-tg
      Port: 3000
      Protocol: HTTP
      VpcId: !Ref VPC
      TargetType: instance
      Targets:
        - Id: !Ref MonitoringInstance
          Port: 3000
      HealthCheckPath: /api/health
      HealthCheckIntervalSeconds: 30
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Matcher:
        HttpCode: 200

  ALBListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ALB
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref GrafanaTG

Outputs:
  VpcId:
    Value: !Ref VPC
    Export:
      Name: !Sub ${AWS::StackName}-VpcId
  PrivateSubnetId:
    Value: !Ref PrivateSubnet
    Export:
      Name: !Sub ${AWS::StackName}-PrivateSubnetId
  PublicSubnetId:
    Value: !Ref PublicSubnet
    Export:
      Name: !Sub ${AWS::StackName}-PublicSubnetId
  HeadNodeSGId:
    Value: !Ref HeadNodeSG
    Export:
      Name: !Sub ${AWS::StackName}-HeadNodeSGId
  ComputeNodeSGId:
    Value: !Ref ComputeNodeSG
    Export:
      Name: !Sub ${AWS::StackName}-ComputeNodeSGId
  LoginNodeSGId:
    Value: !Ref LoginNodeSG
    Export:
      Name: !Sub ${AWS::StackName}-LoginNodeSGId
  FSxLustreFilesystemId:
    Value: !Ref FSxLustre
    Export:
      Name: !Sub ${AWS::StackName}-FSxLustreFilesystemId
  MonitoringInstanceId:
    Value: !Ref MonitoringInstance
  MonitoringInstancePublicIP:
    Value: !GetAtt MonitoringInstance.PublicIp
  GrafanaURL:
    Value: !Sub http://${ALB.DNSName}
    Description: Grafana URL — login with admin / <GrafanaAdminPassword>
